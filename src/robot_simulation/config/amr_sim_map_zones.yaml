zones:
  - zone_id: sim_dock_slow_zone
    map_name: indoor_room
    type: speed_limit
    frame_id: map
    enabled: true
    speed_limit_mps: 0.18
    rule: slow down around the simulated charging dock
    polygon:
      - [-4.55, -4.45]
      - [-3.20, -4.45]
      - [-3.20, -3.10]
      - [-4.55, -3.10]
  - zone_id: sim_center_traffic_slow_zone
    map_name: indoor_room
    type: speed_limit
    frame_id: map
    enabled: true
    speed_limit_mps: 0.35
    rule: limit speed through the simulated traffic intersection
    polygon:
      - [-0.85, -0.85]
      - [0.85, -0.85]
      - [0.85, 0.85]
      - [-0.85, 0.85]
  - zone_id: sim_elevator_service_area
    map_name: indoor_room
    type: preferred_lane
    frame_id: map
    enabled: true
    speed_limit_mps: 0.0
    rule: mark the simulated elevator approach as a preferred service area
    polygon:
      - [2.85, 2.10]
      - [4.45, 2.10]
      - [4.45, 4.35]
      - [2.85, 4.35]
