# been validated in Gazebo/Nav2.
obstacle_name: temporary_box_obstacle
frame_id: map
pose:
  x: -2.35
  y: 1.85
  yaw: 0.0
size:
  x: 0.55
  y: 0.55
  z: 0.70
suggested_segment: station_A_to_station_B
expected_observation:
  - /scan should see the obstacle when the robot approaches the corridor.
  - /local_costmap/costmap should mark the obstacle after Nav2 is running.
