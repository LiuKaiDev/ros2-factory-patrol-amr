analyzers:
  ros__parameters:
    path: Robot
    chassis:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Chassis
      startswith: ["system/chassis", "system/battery"]
    sensors:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Sensors
      startswith: ["system/scan", "system/imu", "system/odom", "laser_filter", "imu_filter"]
    safety:
      type: diagnostic_aggregator/GenericAnalyzer
      path: Safety
      startswith: ["system/emergency_stop"]
