name: static-checks

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Python syntax check
        run: python -m py_compile scripts/*.py

      - name: Project showcase readiness
        run: bash scripts/check_project_showcase_readiness.sh

      - name: Static acceptance checks
        run: |
          bash scripts/check_nav2_costmap_obstacle_layer.sh
          bash scripts/check_chassis_protocol_v2.sh
          bash scripts/check_chassis_odom_calibration.sh
          bash scripts/check_localization_health.sh
          bash scripts/check_safety_state_machine.sh
          bash scripts/check_factory_patrol_assets.sh
          bash scripts/check_factory_patrol_demo_workflows.sh

# Future CI expansion:
# Add a ROS2 Jazzy colcon build job after the runner image, rosdep dependency
# set, and package build matrix are verified in the same environment.
